<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Imperion AI</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
  --void:#030506;
  --deep:#080d10;
  --surface:#0c1318;
  --raised:#111d24;
  --border:rgba(180,120,60,0.15);
  --border-bright:rgba(180,120,60,0.4);
  --gold:#c8860a;
  --gold-light:#e8a020;
  --gold-dim:#8a5c06;
  --crimson:#8b1a1a;
  --crimson-bright:#c0392b;
  --ash:#a89880;
  --mist:#6b7c88;
  --text:#d4c4a8;
  --text-bright:#ede0c4;
  --text-dim:#7a6a54;
  --white:#f0e8d8;
  --mono:'JetBrains Mono',monospace;
  --display:'Cinzel',serif;
  --body:'Crimson Pro',serif;
  --sidebar-w:240px;
}

html,body{height:100%;overflow:hidden}
body{background:var(--void);color:var(--text);font-family:var(--body);font-size:16px;line-height:1.6}

/* Animated background */
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 600px 400px at 15% 50%, rgba(139,26,26,0.06) 0%, transparent 70%),
    radial-gradient(ellipse 400px 600px at 85% 20%, rgba(200,134,10,0.05) 0%, transparent 70%),
    radial-gradient(ellipse 800px 300px at 50% 100%, rgba(8,13,16,0.9) 0%, transparent 100%);
  pointer-events:none;z-index:0;
}

/* Sharingan background pattern */
body::after{
  content:'';position:fixed;inset:0;
  background-image:
    radial-gradient(circle at 1px 1px, rgba(180,120,60,0.03) 1px, transparent 0);
  background-size:40px 40px;
  pointer-events:none;z-index:0;
}

#root{position:relative;z-index:1;height:100vh;display:flex}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:2px}

/* ── SIDEBAR ── */
.sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);
  background:linear-gradient(180deg, var(--deep) 0%, var(--void) 100%);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;height:100vh;
  position:relative;overflow:hidden;
}
.sidebar::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.sidebar::after{
  content:'';position:absolute;top:0;right:0;width:1px;height:100%;
  background:linear-gradient(180deg,var(--gold-dim),transparent 40%,transparent 60%,var(--gold-dim));
}

.sidebar-brand{padding:28px 24px 24px;border-bottom:1px solid var(--border)}
.brand-eye{
  width:44px;height:44px;border-radius:50%;
  border:2px solid var(--gold-dim);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:12px;position:relative;
  background:radial-gradient(circle,rgba(139,26,26,0.3),transparent);
}
.brand-eye::before{
  content:'';position:absolute;
  width:16px;height:16px;border-radius:50%;
  background:radial-gradient(circle,var(--crimson-bright),var(--crimson));
  box-shadow:0 0 12px rgba(192,57,43,0.6);
}
.brand-eye::after{
  content:'';position:absolute;
  width:34px;height:34px;border-radius:50%;
  border:1px solid rgba(180,120,60,0.2);
  animation:spin 20s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

.brand-name{font-family:var(--display);font-size:15px;font-weight:700;letter-spacing:0.2em;color:var(--gold-light);text-transform:uppercase}
.brand-sub{font-family:var(--mono);font-size:9px;color:var(--mist);letter-spacing:0.15em;margin-top:2px;text-transform:uppercase}

.nav-section{flex:1;padding:20px 12px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.nav-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 14px;border-radius:6px;
  background:transparent;border:1px solid transparent;
  color:var(--mist);cursor:pointer;
  font-family:var(--display);font-size:11px;font-weight:600;
  letter-spacing:0.1em;text-transform:uppercase;
  transition:all 0.2s;width:100%;text-align:left;
}
.nav-item:hover{color:var(--ash);border-color:var(--border);background:rgba(180,120,60,0.04)}
.nav-item.active{
  color:var(--gold-light);
  border-color:var(--border-bright);
  background:linear-gradient(90deg,rgba(200,134,10,0.1),transparent);
}
.nav-item.active .nav-icon{color:var(--gold)}
.nav-icon{font-size:14px;width:18px;text-align:center}

.sidebar-footer{padding:16px 12px;border-top:1px solid var(--border)}
.role-badge{
  font-family:var(--mono);font-size:9px;color:var(--gold-dim);
  letter-spacing:0.15em;text-transform:uppercase;
  padding:4px 10px;border:1px solid var(--border);border-radius:20px;
  display:inline-block;margin-bottom:10px;
}
.btn-logout{
  width:100%;padding:8px;background:transparent;
  border:1px solid var(--border);border-radius:6px;
  color:var(--mist);font-family:var(--display);font-size:10px;
  letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;
  transition:all 0.2s;
}
.btn-logout:hover{border-color:var(--crimson);color:var(--crimson-bright)}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

.topbar{
  padding:20px 32px;
  border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
  background:linear-gradient(90deg,rgba(8,13,16,0.8),transparent);
  flex-shrink:0;
}
.page-title{font-family:var(--display);font-size:18px;font-weight:600;color:var(--text-bright);letter-spacing:0.05em}
.page-sub{font-family:var(--mono);font-size:10px;color:var(--mist);margin-top:3px;letter-spacing:0.08em}

.page-content{flex:1;overflow-y:auto;padding:28px 32px}

/* ── CARDS ── */
.card{
  background:var(--raised);
  border:1px solid var(--border);
  border-radius:8px;padding:20px;
  position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(180,120,60,0.3),transparent);
}

/* ── TAGS ── */
.tag{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 10px;border-radius:3px;
  font-size:10px;font-weight:500;font-family:var(--mono);
  letter-spacing:0.05em;border:1px solid;
}
.tag-gold{background:rgba(200,134,10,0.1);color:var(--gold-light);border-color:rgba(200,134,10,0.3)}
.tag-green{background:rgba(34,197,94,0.08);color:#4ade80;border-color:rgba(34,197,94,0.2)}
.tag-red{background:rgba(139,26,26,0.2);color:#f87171;border-color:rgba(139,26,26,0.4)}
.tag-ash{background:rgba(168,152,128,0.08);color:var(--ash);border-color:rgba(168,152,128,0.2)}

/* ── INPUTS ── */
input,textarea,select{
  font-family:var(--body);font-size:15px;
  background:var(--deep);
  border:1px solid var(--border);
  color:var(--text-bright);
  border-radius:6px;padding:10px 14px;width:100%;
  outline:none;transition:border 0.2s;
}
input:focus,textarea:focus,select:focus{border-color:var(--gold-dim)}
input::placeholder,textarea::placeholder{color:var(--text-dim)}
select option{background:var(--deep)}

/* ── BUTTONS ── */
button{font-family:var(--display);cursor:pointer;border:none;transition:all 0.2s}
.btn-primary{
  background:linear-gradient(135deg,var(--gold),var(--gold-dim));
  color:var(--void);
  border-radius:6px;padding:10px 24px;
  font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;
  box-shadow:0 2px 20px rgba(200,134,10,0.2);
}
.btn-primary:hover{box-shadow:0 4px 30px rgba(200,134,10,0.4);transform:translateY(-1px)}
.btn-primary:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.btn-ghost{
  background:transparent;color:var(--ash);
  border:1px solid var(--border);border-radius:6px;
  padding:10px 24px;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;
}
.btn-ghost:hover{border-color:var(--gold-dim);color:var(--gold-light)}
.btn-sm{padding:7px 16px!important;font-size:10px!important}

/* ── SPINNER ── */
.spinner{
  width:16px;height:16px;
  border:2px solid rgba(200,134,10,0.2);
  border-top-color:var(--gold);
  border-radius:50%;
  animation:spin .6s linear infinite;
  display:inline-block;vertical-align:middle;
}

/* ── DIVIDER ── */
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:20px 0}

/* ── FADE IN ── */
.fade{animation:fadeUp .3s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ── AUTH ── */
.auth-wrap{
  width:100%;height:100vh;display:flex;align-items:center;justify-content:center;
  position:relative;
}
.auth-wrap::before{
  content:'';position:absolute;
  width:600px;height:600px;border-radius:50%;
  background:radial-gradient(circle,rgba(139,26,26,0.08),transparent 70%);
  pointer-events:none;
}
.auth-card{width:100%;max-width:400px;position:relative}
.auth-header{text-align:center;margin-bottom:36px}
.auth-symbol{
  width:64px;height:64px;border-radius:50%;margin:0 auto 16px;
  border:2px solid var(--gold-dim);
  display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle,rgba(139,26,26,0.2),transparent);
  position:relative;
}
.auth-symbol::before{
  content:'';position:absolute;
  width:24px;height:24px;border-radius:50%;
  background:radial-gradient(circle,var(--crimson-bright),var(--crimson));
  box-shadow:0 0 20px rgba(192,57,43,0.5);
}
.auth-symbol::after{
  content:'';position:absolute;inset:-6px;border-radius:50%;
  border:1px solid rgba(180,120,60,0.2);
  animation:spin 15s linear infinite;
}
.auth-title{font-family:var(--display);font-size:24px;font-weight:900;letter-spacing:0.2em;color:var(--gold-light)}
.auth-quote{font-family:var(--body);font-style:italic;font-size:13px;color:var(--mist);margin-top:6px}

.tab-row{display:flex;gap:0;margin-bottom:24px;border:1px solid var(--border);border-radius:6px;overflow:hidden}
.tab-btn{
  flex:1;padding:10px;background:transparent;
  font-family:var(--display);font-size:10px;font-weight:600;
  letter-spacing:0.12em;text-transform:uppercase;
  color:var(--mist);border:none;cursor:pointer;transition:all 0.2s;
}
.tab-btn.active{background:rgba(200,134,10,0.12);color:var(--gold-light)}

.alert{
  padding:10px 14px;border-radius:6px;
  font-family:var(--body);font-size:14px;margin-bottom:14px;
  border:1px solid;
}
.alert-err{background:rgba(139,26,26,0.15);color:#f87171;border-color:rgba(139,26,26,0.3)}
.alert-ok{background:rgba(34,197,94,0.08);color:#4ade80;border-color:rgba(34,197,94,0.2)}

/* ── CHAT ── */
.chat-wrap{display:flex;flex-direction:column;height:100%}
.chat-messages{flex:1;overflow-y:auto;padding:24px 32px;display:flex;flex-direction:column;gap:20px}
.msg-row-user{display:flex;justify-content:flex-end}
.msg-row-ai{display:flex;justify-content:flex-start;gap:12px;align-items:flex-start}
.ai-avatar{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  border:1px solid var(--border-bright);
  background:radial-gradient(circle,rgba(139,26,26,0.3),var(--deep));
  display:flex;align-items:center;justify-content:center;
  font-size:12px;margin-top:2px;
}
.msg-bubble-user{
  max-width:65%;background:linear-gradient(135deg,var(--gold-dim),rgba(139,26,26,0.5));
  border:1px solid rgba(200,134,10,0.3);border-radius:12px 12px 4px 12px;
  padding:12px 16px;color:var(--white);font-size:15px;line-height:1.6;
}
.msg-bubble-ai{
  max-width:70%;background:var(--raised);
  border:1px solid var(--border);border-radius:4px 12px 12px 12px;
  padding:12px 16px;color:var(--text);font-size:15px;line-height:1.6;
  white-space:pre-wrap;
}
.msg-label{font-family:var(--mono);font-size:9px;color:var(--gold-dim);letter-spacing:0.1em;margin-bottom:5px;text-transform:uppercase}
.chat-input-area{
  padding:16px 32px 20px;
  border-top:1px solid var(--border);
  background:linear-gradient(0deg,var(--void),transparent);
  display:flex;gap:10px;align-items:flex-end;
}
.chat-input{
  flex:1;resize:none;min-height:44px;max-height:120px;
  background:var(--raised);border:1px solid var(--border);
  border-radius:8px;padding:12px 16px;
  font-family:var(--body);font-size:15px;color:var(--text-bright);
  outline:none;transition:border 0.2s;line-height:1.5;
}
.chat-input:focus{border-color:var(--gold-dim)}

/* ── EVAL BAR ── */
.eval-bar{
  display:flex;gap:8px;flex-wrap:wrap;padding:10px 32px;
  border-bottom:1px solid var(--border);
  background:rgba(8,13,16,0.5);flex-shrink:0;
}

/* ── STAT GRID ── */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px}
.stat-card{
  background:var(--raised);border:1px solid var(--border);border-radius:8px;
  padding:18px;text-align:center;position:relative;overflow:hidden;
}
.stat-card::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold-dim),transparent);
}
.stat-val{font-family:var(--display);font-size:26px;font-weight:700;color:var(--gold-light)}
.stat-label{font-family:var(--mono);font-size:9px;color:var(--mist);letter-spacing:0.1em;text-transform:uppercase;margin-top:4px}

/* ── TRACE ITEM ── */
.trace-item{
  padding:12px 16px;background:var(--deep);
  border:1px solid var(--border);border-radius:6px;margin-bottom:8px;
}
.trace-query{font-family:var(--mono);font-size:11px;color:var(--gold-light);margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── SECTION TITLE ── */
.section-title{
  font-family:var(--display);font-size:13px;font-weight:600;
  color:var(--ash);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:14px;
  display:flex;align-items:center;gap:10px;
}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── LEAD CARD ── */
.lead-card{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 18px;background:var(--raised);
  border:1px solid var(--border);border-radius:6px;margin-bottom:8px;
}
.lead-name{font-family:var(--display);font-size:13px;color:var(--text-bright);font-weight:600}
.lead-email{font-family:var(--mono);font-size:10px;color:var(--mist);margin-top:2px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;
const API = window.location.origin;

function apiFetch(path, opts={}) {
  const token = localStorage.getItem("imp_token");
  const headers = {"Content-Type":"application/json"};
  if(token) headers["Authorization"] = "Bearer "+token;
  return fetch(API+path,{headers,...opts}).then(r=>r.json());
}

// ── AUTH ──────────────────────────────────────────────────────────────────────
function Auth({onLogin}) {
  const [mode,setMode] = useState("login");
  const [u,setU] = useState(""); const [p,setP] = useState("");
  const [t,setT] = useState(""); const [role,setRole] = useState("admin");
  const [err,setErr] = useState(""); const [ok,setOk] = useState("");
  const [loading,setLoading] = useState(false);

  async function submit() {
    if(!u||!p) return;
    setLoading(true); setErr(""); setOk("");
    try {
      if(mode==="register") {
        if(!t){setErr("Company name required");setLoading(false);return;}
        const r = await apiFetch("/auth/register",{method:"POST",body:JSON.stringify({username:u,password:p,tenant_name:t,role})});
        if(r.message){setOk("Account created. Sign in.");setMode("login");}
        else setErr(r.detail||"Registration failed");
      } else {
        const body = new URLSearchParams({username:u,password:p});
        const r = await fetch(API+"/auth/login",{method:"POST",body,headers:{"Content-Type":"application/x-www-form-urlencoded"}}).then(x=>x.json());
        if(r.access_token){
          localStorage.setItem("imp_token",r.access_token);
          localStorage.setItem("imp_role",r.role);
          onLogin(r);
        } else setErr(r.detail||"Invalid credentials");
      }
    } catch(e){setErr("Cannot reach server");}
    setLoading(false);
  }

  return (
    <div className="auth-wrap">
      <div className="auth-card fade">
        <div className="auth-header">
          <div className="auth-symbol"/>
          <div className="auth-title">IMPERION</div>
          <div className="auth-quote">"Those who forgive themselves, and are able to accept their true nature… They are the strong ones."</div>
        </div>
        <div className="card">
          <div className="tab-row">
            <button className={"tab-btn"+(mode==="login"?" active":"")} onClick={()=>setMode("login")}>Sign In</button>
            <button className={"tab-btn"+(mode==="register"?" active":"")} onClick={()=>setMode("register")}>Register</button>
          </div>
          {err && <div className="alert alert-err">{err}</div>}
          {ok && <div className="alert alert-ok">{ok}</div>}
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <input placeholder="Username" value={u} onChange={e=>setU(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()}/>
            <input placeholder="Password" type="password" value={p} onChange={e=>setP(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()}/>
            {mode==="register" && <>
              <input placeholder="Organisation name" value={t} onChange={e=>setT(e.target.value)}/>
              <select value={role} onChange={e=>setRole(e.target.value)}>
                <option value="admin">Admin</option>
                <option value="agent">Agent</option>
              </select>
            </>}
            <button className="btn-primary" onClick={submit} disabled={loading} style={{marginTop:6,height:44}}>
              {loading ? <span className="spinner"/> : (mode==="login"?"Enter the Shadows":"Awaken")}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── SIDEBAR ───────────────────────────────────────────────────────────────────
function Sidebar({tab,setTab,onLogout,role}) {
  const items = [
    {id:"chat",icon:"◈",label:"Intelligence"},
    {id:"docs",icon:"◉",label:"Knowledge"},
    {id:"metrics",icon:"◎",label:"Traces"},
    {id:"leads",icon:"◈",label:"Targets"},
    {id:"memory",icon:"◉",label:"Memory"},
  ];
  return (
    <div className="sidebar">
      <div className="sidebar-brand">
        <div className="brand-eye"/>
        <div className="brand-name">Imperion</div>
        <div className="brand-sub">AI Operations</div>
      </div>
      <div className="nav-section">
        {items.map(item=>(
          <button key={item.id} className={"nav-item"+(tab===item.id?" active":"")} onClick={()=>setTab(item.id)}>
            <span className="nav-icon">{item.icon}</span>
            {item.label}
          </button>
        ))}
      </div>
      <div className="sidebar-footer">
        <div className="role-badge">{(role||"agent").toUpperCase()}</div>
        <button className="btn-logout" onClick={onLogout}>Dissolve Session</button>
      </div>
    </div>
  );
}

// ── CHAT ──────────────────────────────────────────────────────────────────────
function Chat() {
  const [msgs,setMsgs] = useState([{role:"ai",content:"The shadows welcome you. Upload knowledge in the Knowledge tab, then interrogate me — I see through documents, search the web, read your targets, and consult the calendar."}]);
  const [input,setInput] = useState("");
  const [loading,setLoading] = useState(false);
  const [evalData,setEvalData] = useState(null);
  const [sessionId] = useState(()=>"s"+Date.now());
  const bottomRef = useRef();

  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"})},[msgs]);

  async function send() {
    if(!input.trim()||loading) return;
    const q=input; setInput(""); setLoading(true);
    setMsgs(m=>[...m,{role:"user",content:q}]);
    try {
      const r = await apiFetch("/agent/chat",{method:"POST",body:JSON.stringify({query:q,session_id:sessionId})});
      setMsgs(m=>[...m,{role:"ai",content:r.answer||r.detail||"The shadows are silent.",tools:r.tool_calls,eval:r.eval}]);
      if(r.eval) setEvalData(r.eval);
    } catch(e){setMsgs(m=>[...m,{role:"ai",content:"Connection severed."}]);}
    setLoading(false);
  }

  return (
    <div className="chat-wrap">
      <div className="topbar">
        <div>
          <div className="page-title">Intelligence Core</div>
          <div className="page-sub">Planner · Retriever · Executor · Critic</div>
        </div>
        {evalData && (
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <span className="tag tag-gold">⚡ {Math.round(evalData.latency_ms||0)}ms</span>
            <span className="tag tag-ash">🪙 {evalData.tokens_used} tokens</span>
            <span className={"tag "+(evalData.hallucination_risk==="low"?"tag-green":"tag-red")}>
              {evalData.hallucination_risk==="low"?"✓ grounded":"⚠ verify"}
            </span>
          </div>
        )}
      </div>
      <div className="chat-messages">
        {msgs.map((m,i)=>(
          <div key={i} className={"fade "+(m.role==="user"?"msg-row-user":"msg-row-ai")}>
            {m.role==="ai" && (
              <div className="ai-avatar">👁</div>
            )}
            <div>
              {m.role==="ai" && <div className="msg-label">Imperion AI</div>}
              <div className={m.role==="user"?"msg-bubble-user":"msg-bubble-ai"}>{m.content}</div>
              {m.tools && m.tools.length>0 && (
                <div style={{marginTop:6,display:"flex",gap:6,flexWrap:"wrap"}}>
                  {m.tools.map(t=><span key={t} className="tag tag-gold">⚙ {t}</span>)}
                </div>
              )}
            </div>
          </div>
        ))}
        {loading && (
          <div className="msg-row-ai fade">
            <div className="ai-avatar">👁</div>
            <div>
              <div className="msg-label">Imperion AI</div>
              <div className="msg-bubble-ai" style={{display:"flex",alignItems:"center",gap:10}}>
                <div className="spinner"/>
                <span style={{fontFamily:"var(--mono)",fontSize:11,color:"var(--mist)"}}>Consulting the shadows…</span>
              </div>
            </div>
          </div>
        )}
        <div ref={bottomRef}/>
      </div>
      <div className="chat-input-area">
        <textarea
          className="chat-input"
          value={input}
          onChange={e=>setInput(e.target.value)}
          onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}}
          placeholder="Ask anything… 'search web for AI news' · 'check my calendar' · 'find lead John'"
          rows={1}
        />
        <button className="btn-primary" onClick={send} disabled={loading} style={{height:44,whiteSpace:"nowrap"}}>
          {loading?<span className="spinner"/>:"Transmit"}
        </button>
      </div>
    </div>
  );
}

// ── DOCS ──────────────────────────────────────────────────────────────────────
function Docs() {
  const [file,setFile] = useState(null);
  const [text,setText] = useState("");
  const [source,setSource] = useState("");
  const [msg,setMsg] = useState({});
  const [loading,setLoading] = useState(false);

  async function uploadFile() {
    if(!file) return; setLoading(true); setMsg({});
    const fd=new FormData(); fd.append("file",file);
    const token=localStorage.getItem("imp_token");
    const r = await fetch(API+"/docs/upload",{method:"POST",headers:{Authorization:"Bearer "+token},body:fd}).then(x=>x.json());
    setMsg({text:r.message||r.detail,ok:!!r.message}); setLoading(false);
  }

  async function addText() {
    if(!text.trim()) return; setLoading(true); setMsg({});
    const r = await apiFetch("/docs/add-text",{method:"POST",body:JSON.stringify({text,source:source||"manual"})});
    setMsg({text:r.message||r.detail,ok:!!r.message}); setText(""); setLoading(false);
  }

  return (
    <div>
      <div className="topbar">
        <div>
          <div className="page-title">Knowledge Repository</div>
          <div className="page-sub">Documents are chunked · embedded · indexed for retrieval</div>
        </div>
      </div>
      <div className="page-content">
        {msg.text && <div className={"alert "+(msg.ok?"alert-ok":"alert-err")} style={{marginBottom:20}}>{msg.text}</div>}
        <div className="section-title">Upload Scroll</div>
        <div className="card" style={{marginBottom:20}}>
          <p style={{fontFamily:"var(--body)",fontSize:14,color:"var(--mist)",marginBottom:14}}>Supported formats: .txt · .md · .csv</p>
          <input type="file" accept=".txt,.md,.csv" onChange={e=>setFile(e.target.files[0])} style={{marginBottom:14,background:"transparent",border:"none",padding:0,color:"var(--ash)",fontSize:14}}/>
          <br/>
          <button className="btn-primary btn-sm" onClick={uploadFile} disabled={loading||!file}>
            {loading?<span className="spinner"/>:"Index Document"}
          </button>
        </div>
        <div className="section-title">Inscribe Directly</div>
        <div className="card">
          <textarea value={text} onChange={e=>setText(e.target.value)} rows={6} placeholder="Paste knowledge — product details, FAQs, protocols, lore…" style={{marginBottom:12,resize:"vertical"}}/>
          <input value={source} onChange={e=>setSource(e.target.value)} placeholder="Source label (e.g. ops-manual)" style={{marginBottom:12}}/>
          <button className="btn-primary btn-sm" onClick={addText} disabled={loading||!text.trim()}>
            {loading?<span className="spinner"/>:"Commit to Memory"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── METRICS ───────────────────────────────────────────────────────────────────
function Metrics() {
  const [data,setData] = useState(null);
  useEffect(()=>{apiFetch("/metrics/dashboard").then(r=>setData(r));},[]);
  if(!data) return <div style={{padding:40,display:"flex",gap:12,alignItems:"center"}}><div className="spinner"/><span style={{color:"var(--mist)",fontFamily:"var(--mono)",fontSize:12}}>Reading traces…</span></div>;

  const stats=[
    {label:"Queries",value:data.total_queries,icon:"◈"},
    {label:"Avg Latency",value:data.avg_latency_ms+"ms",icon:"⚡"},
    {label:"Tokens Used",value:(data.total_tokens||0).toLocaleString(),icon:"◉"},
    {label:"Leads",value:data.lead_count,icon:"◈"},
    {label:"Memories",value:data.memory_count,icon:"◎"},
  ];

  return (
    <div>
      <div className="topbar">
        <div>
          <div className="page-title">Trace Observatory</div>
          <div className="page-sub">Every operation recorded · evaluated · stored</div>
        </div>
      </div>
      <div className="page-content">
        <div className="stat-grid">
          {stats.map(s=>(
            <div key={s.label} className="stat-card fade">
              <div style={{fontFamily:"var(--mono)",fontSize:18,color:"var(--gold-dim)",marginBottom:6}}>{s.icon}</div>
              <div className="stat-val">{s.value}</div>
              <div className="stat-label">{s.label}</div>
            </div>
          ))}
        </div>
        <div className="section-title">Recent Operations</div>
        {(!data.recent_traces||data.recent_traces.length===0) && (
          <div className="card" style={{color:"var(--mist)",fontFamily:"var(--mono)",fontSize:12}}>No operations recorded yet. Begin in Intelligence Core.</div>
        )}
        {(data.recent_traces||[]).map((t,i)=>(
          <div key={i} className="trace-item fade">
            <div className="trace-query">{t.query}</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              <span className="tag tag-gold">⚡ {Math.round(t.latency_ms||0)}ms</span>
              <span className="tag tag-ash">🪙 {t.tokens}</span>
              {(t.tools||[]).map(tool=><span key={tool} className="tag tag-green">⚙ {tool}</span>)}
              {t.eval && <span className={"tag "+(t.eval.hallucination_risk==="low"?"tag-green":"tag-red")}>{t.eval.hallucination_risk}</span>}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── LEADS ─────────────────────────────────────────────────────────────────────
function Leads() {
  const [leads,setLeads] = useState([]);
  const [name,setName]=useState(""); const [email,setEmail]=useState(""); const [notes,setNotes]=useState("");
  const [loading,setLoading]=useState(true); const [msg,setMsg]=useState("");

  function load(){apiFetch("/metrics/leads").then(r=>{setLeads(Array.isArray(r)?r:[]);setLoading(false);});}
  useEffect(()=>{load();},[]);

  async function create(){
    const r=await apiFetch("/metrics/leads",{method:"POST",body:JSON.stringify({name,email,notes})});
    if(r.id){setMsg("Target acquired.");setName("");setEmail("");setNotes("");load();}
    else setMsg(r.detail||"Error");
  }

  return (
    <div>
      <div className="topbar">
        <div>
          <div className="page-title">Target Registry</div>
          <div className="page-sub">CRM leads · isolated per tenant · queryable by AI</div>
        </div>
      </div>
      <div className="page-content">
        <div className="section-title">New Target</div>
        <div className="card" style={{marginBottom:24}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
            <input placeholder="Name" value={name} onChange={e=>setName(e.target.value)}/>
            <input placeholder="Email" value={email} onChange={e=>setEmail(e.target.value)}/>
          </div>
          <input placeholder="Notes" value={notes} onChange={e=>setNotes(e.target.value)} style={{marginBottom:12}}/>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <button className="btn-primary btn-sm" onClick={create}>Add Target</button>
            {msg && <span style={{fontFamily:"var(--mono)",fontSize:11,color:"var(--gold)"}}>{msg}</span>}
          </div>
        </div>
        <div className="section-title">Active Targets</div>
        {loading?<div className="spinner"/>:leads.length===0?
          <div className="card" style={{color:"var(--mist)",fontFamily:"var(--mono)",fontSize:12}}>No targets. Add one above or ask the AI to look one up.</div>:
          leads.map(l=>(
            <div key={l.id} className="lead-card">
              <div>
                <div className="lead-name">{l.name}</div>
                <div className="lead-email">{l.email}</div>
                {l.notes && <div style={{fontSize:12,color:"var(--mist)",marginTop:3}}>{l.notes}</div>}
              </div>
              <span className={"tag "+(l.status==="converted"?"tag-green":l.status==="contacted"?"tag-gold":"tag-ash")}>{l.status}</span>
            </div>
          ))
        }
      </div>
    </div>
  );
}

// ── MEMORY ────────────────────────────────────────────────────────────────────
function Memory() {
  const [content,setContent]=useState(""); const [type,setType]=useState("fact"); const [msg,setMsg]=useState("");
  async function save(){
    if(!content.trim()) return;
    const r=await apiFetch("/metrics/memory",{method:"POST",body:JSON.stringify({content,type})});
    setMsg(r.message||"Committed to shadow memory.");setContent("");
  }
  return (
    <div>
      <div className="topbar">
        <div>
          <div className="page-title">Shadow Memory</div>
          <div className="page-sub">Persistent context injected into every agent prompt</div>
        </div>
      </div>
      <div className="page-content">
        <div className="section-title">Inscribe Memory</div>
        <div className="card" style={{marginBottom:16}}>
          <textarea value={content} onChange={e=>setContent(e.target.value)} rows={4}
            placeholder="e.g. 'User operates in the healthcare sector' · 'Prefer concise, formal responses'"
            style={{marginBottom:12,resize:"vertical"}}/>
          <div style={{display:"flex",gap:10,alignItems:"center"}}>
            <select value={type} onChange={e=>setType(e.target.value)} style={{maxWidth:180}}>
              <option value="fact">Fact</option>
              <option value="preference">Preference</option>
              <option value="history">History</option>
            </select>
            <button className="btn-primary btn-sm" onClick={save} disabled={!content.trim()}>Commit</button>
            {msg && <span style={{fontFamily:"var(--mono)",fontSize:11,color:"var(--gold)"}}>{msg}</span>}
          </div>
        </div>
        <div className="card" style={{borderColor:"rgba(139,26,26,0.3)"}}>
          <div style={{fontFamily:"var(--display)",fontSize:12,color:"var(--ash)",letterSpacing:"0.08em",marginBottom:8}}>HOW IT WORKS</div>
          <p style={{fontFamily:"var(--body)",fontSize:14,color:"var(--mist)",lineHeight:1.7}}>
            Every memory inscribed here is retrieved before each agent invocation and woven into the system prompt.
            The AI will recall these facts across all sessions — persistent identity across the void.
          </p>
        </div>
      </div>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [user,setUser] = useState(()=>{
    const token=localStorage.getItem("imp_token");
    const role=localStorage.getItem("imp_role");
    return token?{token,role}:null;
  });
  const [tab,setTab] = useState("chat");

  function logout(){localStorage.removeItem("imp_token");localStorage.removeItem("imp_role");setUser(null);}

  if(!user) return React.createElement(Auth,{onLogin:u=>setUser(u)});

  const pages={chat:React.createElement(Chat),docs:React.createElement(Docs),metrics:React.createElement(Metrics),leads:React.createElement(Leads),memory:React.createElement(Memory)};

  return (
    <div style={{display:"flex",height:"100vh",overflow:"hidden"}}>
      <Sidebar tab={tab} setTab={setTab} onLogout={logout} role={user.role}/>
      <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
        {pages[tab]}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
