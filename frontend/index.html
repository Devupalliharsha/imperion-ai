<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Imperion AI Platform</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0f;color:#e8e8f0;font-family:'Syne',sans-serif;min-height:100vh}
input,textarea,select{font-family:'Syne',sans-serif;background:#111118;border:1px solid rgba(255,255,255,0.08);color:#e8e8f0;border-radius:8px;padding:10px 14px;width:100%;outline:none;font-size:14px;transition:border .2s}
input:focus,textarea:focus{border-color:#7c6aff}
button{font-family:'Syne',sans-serif;cursor:pointer;border:none;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:600;transition:all .15s}
.btn-primary{background:#7c6aff;color:#fff}
.btn-primary:hover{background:#6b59ee}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed}
.btn-ghost{background:transparent;color:#6b6b80;border:1px solid rgba(255,255,255,0.08)}
.btn-ghost:hover{border-color:#7c6aff;color:#a78bfa}
.btn-sm{padding:6px 14px;font-size:13px}
.card{background:#16161f;border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:20px}
.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;font-family:'JetBrains Mono',monospace}
.tag-green{background:rgba(34,211,165,0.1);color:#22d3a5}
.tag-amber{background:rgba(251,191,36,0.1);color:#fbbf24}
.tag-red{background:rgba(248,113,113,0.1);color:#f87171}
.tag-purple{background:rgba(124,106,255,0.1);color:#a78bfa}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,0.1);border-top-color:#7c6aff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.fade-in{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px}
.sidebar{width:200px;background:#111118;border-right:1px solid rgba(255,255,255,0.06);display:flex;flex-direction:column;height:100vh;padding:20px 0;position:fixed;left:0;top:0}
.nav-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;background:transparent;color:#6b6b80;border:none;cursor:pointer;text-align:left;font-size:14px;font-family:'Syne',sans-serif;font-weight:600;transition:all .15s;width:100%}
.nav-btn:hover{color:#a78bfa}
.nav-btn.active{background:rgba(124,106,255,0.15);color:#a78bfa}
.main{margin-left:200px;flex:1;min-height:100vh;overflow-y:auto}
.topbar{padding:20px 24px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;justify-content:space-between;align-items:center}
</style>
</head>
<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#6b6b80">Loading...</div></div>
<script type="text/babel">
const {useState, useEffect, useRef} = React;
const API = window.location.origin;

function apiFetch(path, opts={}) {
  const token = localStorage.getItem("imp_token");
  const headers = {"Content-Type":"application/json"};
  if (token) headers["Authorization"] = "Bearer " + token;
  return fetch(API + path, {headers, ...opts}).then(r => r.json());
}

function AuthScreen({onLogin}) {
  const [mode, setMode] = useState("login");
  const [username, setUsername] = useState("");
  const [password, setPassword] = useState("");
  const [tenant, setTenant] = useState("");
  const [role, setRole] = useState("admin");
  const [err, setErr] = useState("");
  const [loading, setLoading] = useState(false);

  async function submit() {
    setLoading(true); setErr("");
    try {
      if (mode === "register") {
        const r = await apiFetch("/auth/register", {method:"POST", body:JSON.stringify({username, password, tenant_name:tenant, role})});
        if (r.message) { setMode("login"); setErr("Registered! Now login."); }
        else setErr(r.detail || "Error");
      } else {
        const body = new URLSearchParams({username, password});
        const r = await fetch(API+"/auth/login",{method:"POST",body,headers:{"Content-Type":"application/x-www-form-urlencoded"}}).then(x=>x.json());
        if (r.access_token) {
          localStorage.setItem("imp_token", r.access_token);
          localStorage.setItem("imp_role", r.role);
          onLogin(r);
        } else setErr(r.detail || "Invalid credentials");
      }
    } catch(e){ setErr("Connection error — is the server running?"); }
    setLoading(false);
  }

  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{width:"100%",maxWidth:400}} className="fade-in">
        <div style={{textAlign:"center",marginBottom:40}}>
          <div style={{fontSize:32,fontWeight:800}}><span style={{color:"#7c6aff"}}>IMPERION</span></div>
          <div style={{color:"#6b6b80",fontSize:13,marginTop:6}}>Multi-tenant AI Platform</div>
        </div>
        <div className="card">
          <div style={{display:"flex",gap:8,marginBottom:20}}>
            <button onClick={()=>setMode("login")} style={{flex:1}} className={mode==="login"?"btn-primary":"btn-ghost"}>Login</button>
            <button onClick={()=>setMode("register")} style={{flex:1}} className={mode==="register"?"btn-primary":"btn-ghost"}>Register</button>
          </div>
          {err && <div style={{padding:"10px 14px",borderRadius:8,marginBottom:14,background:err.includes("!")?"rgba(34,211,165,0.1)":"rgba(248,113,113,0.1)",color:err.includes("!")?"#22d3a5":"#f87171",fontSize:13}}>{err}</div>}
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <input placeholder="Username" value={username} onChange={e=>setUsername(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()}/>
            <input placeholder="Password" type="password" value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()}/>
            {mode==="register" && <>
              <input placeholder="Company name (your tenant)" value={tenant} onChange={e=>setTenant(e.target.value)}/>
              <select value={role} onChange={e=>setRole(e.target.value)} style={{background:"#111118",color:"#e8e8f0",border:"1px solid rgba(255,255,255,0.08)",borderRadius:8,padding:"10px 14px"}}>
                <option value="admin">Admin</option>
                <option value="agent">Agent</option>
              </select>
            </>}
            <button className="btn-primary" onClick={submit} disabled={loading} style={{height:44,marginTop:4}}>
              {loading ? <span className="spinner"/> : (mode==="login" ? "Sign In" : "Create Account")}
            </button>
          </div>
        </div>
        <div style={{textAlign:"center",marginTop:16,color:"#6b6b80",fontSize:12}}>Register as admin → upload docs → chat</div>
      </div>
    </div>
  );
}

function ChatTab() {
  const [messages, setMessages] = useState([{role:"assistant",content:"Hi! I'm your Imperion AI assistant. Upload documents in the Documents tab, then ask me anything about them. I can also search the web, check your CRM, or look up calendar events."}]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [sessionId] = useState(()=>"sess_"+Math.random().toString(36).slice(2));
  const [lastEval, setLastEval] = useState(null);
  const bottomRef = useRef();

  useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:"smooth"}); }, [messages]);

  async function send() {
    if (!input.trim() || loading) return;
    const q = input; setInput(""); setLoading(true);
    setMessages(m=>[...m,{role:"user",content:q}]);
    try {
      const r = await apiFetch("/agent/chat",{method:"POST",body:JSON.stringify({query:q,session_id:sessionId})});
      setMessages(m=>[...m,{role:"assistant",content:r.answer||r.detail||"Error getting response",tools:r.tool_calls,eval:r.eval}]);
      if(r.eval) setLastEval(r.eval);
    } catch(e){
      setMessages(m=>[...m,{role:"assistant",content:"Connection error."}]);
    }
    setLoading(false);
  }

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100vh"}}>
      <div className="topbar">
        <div>
          <div style={{fontWeight:700,fontSize:18}}>AI Chat</div>
          <div style={{color:"#6b6b80",fontSize:12,marginTop:2,fontFamily:"'JetBrains Mono',monospace"}}>Planner → Retriever → Executor → Critic</div>
        </div>
        {lastEval && (
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            <span className="tag tag-purple">⚡ {Math.round(lastEval.latency_ms)}ms</span>
            <span className="tag tag-green">🎯 {Math.round((lastEval.faithfulness||0)*100)}% grounded</span>
            <span className={"tag tag-"+(lastEval.hallucination_risk==="low"?"green":lastEval.hallucination_risk==="medium"?"amber":"red")}>hallucination: {lastEval.hallucination_risk}</span>
            <span className="tag tag-amber">🪙 {lastEval.tokens_used} tokens</span>
          </div>
        )}
      </div>
      <div style={{flex:1,overflowY:"auto",padding:24,display:"flex",flexDirection:"column",gap:16}}>
        {messages.map((m,i)=>(
          <div key={i} className="fade-in" style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
            <div style={{maxWidth:"75%"}}>
              {m.role==="assistant" && <div style={{fontSize:11,color:"#6b6b80",marginBottom:4,fontFamily:"'JetBrains Mono',monospace"}}>IMPERION AI</div>}
              <div style={{background:m.role==="user"?"#7c6aff":"#16161f",border:m.role==="user"?"none":"1px solid rgba(255,255,255,0.08)",borderRadius:m.role==="user"?"12px 12px 4px 12px":"12px 12px 12px 4px",padding:"12px 16px",color:m.role==="user"?"#fff":"#e8e8f0",fontSize:14,lineHeight:1.6,whiteSpace:"pre-wrap"}}>{m.content}</div>
              {m.tools && m.tools.length>0 && (
                <div style={{marginTop:6,display:"flex",gap:6,flexWrap:"wrap"}}>
                  {m.tools.map(t=><span key={t} className="tag tag-green">🔧 {t}</span>)}
                </div>
              )}
            </div>
          </div>
        ))}
        {loading && (
          <div className="fade-in" style={{display:"flex",gap:10,alignItems:"center"}}>
            <div className="spinner"/>
            <span style={{color:"#6b6b80",fontSize:13}}>Planning → Retrieving → Executing → Validating...</span>
          </div>
        )}
        <div ref={bottomRef}/>
      </div>
      <div style={{padding:"16px 24px",borderTop:"1px solid rgba(255,255,255,0.06)",display:"flex",gap:10}}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&send()} placeholder="Ask anything… try: 'search the web for AI trends' or 'check my calendar'" style={{flex:1,height:44}}/>
        <button className="btn-primary" onClick={send} disabled={loading} style={{width:80,height:44}}>
          {loading ? <span className="spinner"/> : "Send"}
        </button>
      </div>
    </div>
  );
}

function DocsTab() {
  const [file, setFile] = useState(null);
  const [text, setText] = useState("");
  const [source, setSource] = useState("manual");
  const [msg, setMsg] = useState("");
  const [loading, setLoading] = useState(false);

  async function uploadFile() {
    if(!file) return; setLoading(true); setMsg("");
    const fd = new FormData(); fd.append("file", file);
    const token = localStorage.getItem("imp_token");
    const r = await fetch(API+"/docs/upload",{method:"POST",headers:{Authorization:"Bearer "+token},body:fd}).then(x=>x.json());
    setMsg(r.message||r.detail||"Done"); setLoading(false);
  }

  async function addText() {
    if(!text.trim()) return; setLoading(true); setMsg("");
    const r = await apiFetch("/docs/add-text",{method:"POST",body:JSON.stringify({text,source})});
    setMsg(r.message||r.detail); setText(""); setLoading(false);
  }

  return (
    <div style={{padding:24,maxWidth:700}}>
      <div style={{fontWeight:700,fontSize:20,marginBottom:4}}>Document Knowledge Base</div>
      <div style={{color:"#6b6b80",fontSize:13,marginBottom:24}}>Uploaded docs are chunked, embedded, and stored in ChromaDB. The agent retrieves them during chat.</div>
      <div className="card" style={{marginBottom:16}}>
        <div style={{fontWeight:600,marginBottom:10}}>Upload a file (.txt, .md, .csv)</div>
        <input type="file" accept=".txt,.md,.csv" onChange={e=>setFile(e.target.files[0])} style={{marginBottom:12,background:"transparent",border:"none",padding:0}}/>
        <br/>
        <button className="btn-primary btn-sm" onClick={uploadFile} disabled={loading||!file}>
          {loading ? <span className="spinner"/> : "Upload & Index"}
        </button>
      </div>
      <div className="card">
        <div style={{fontWeight:600,marginBottom:10}}>Add text directly</div>
        <textarea value={text} onChange={e=>setText(e.target.value)} rows={5} placeholder="Paste any knowledge here — FAQs, product info, company data..." style={{marginBottom:10,resize:"vertical"}}/>
        <input value={source} onChange={e=>setSource(e.target.value)} placeholder="Source label (e.g. company-faq)" style={{marginBottom:10}}/>
        <button className="btn-primary btn-sm" onClick={addText} disabled={loading||!text.trim()}>
          {loading ? <span className="spinner"/> : "Add to Knowledge Base"}
        </button>
      </div>
      {msg && <div style={{marginTop:14,padding:"10px 14px",borderRadius:8,background:"rgba(34,211,165,0.1)",color:"#22d3a5",fontSize:13}}>{msg}</div>}
    </div>
  );
}

function MetricsTab() {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  useEffect(()=>{ apiFetch("/metrics/dashboard").then(r=>{setData(r);setLoading(false);}); },[]);

  if(loading) return <div style={{padding:40,display:"flex",gap:12,alignItems:"center"}}><div className="spinner"/><span style={{color:"#6b6b80"}}>Loading...</span></div>;

  const stats = [
    {label:"Total Queries",value:data.total_queries,icon:"🔍"},
    {label:"Avg Latency",value:data.avg_latency_ms+"ms",icon:"⚡"},
    {label:"Total Tokens",value:(data.total_tokens||0).toLocaleString(),icon:"🪙"},
    {label:"CRM Leads",value:data.lead_count,icon:"👤"},
    {label:"Memories",value:data.memory_count,icon:"🧠"},
  ];

  return (
    <div style={{padding:24}}>
      <div style={{fontWeight:700,fontSize:20,marginBottom:4}}>Observability Dashboard</div>
      <div style={{color:"#6b6b80",fontSize:13,marginBottom:24}}>Every agent run is traced and evaluated automatically.</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:12,marginBottom:24}}>
        {stats.map(s=>(
          <div key={s.label} className="card" style={{textAlign:"center"}}>
            <div style={{fontSize:24,marginBottom:8}}>{s.icon}</div>
            <div style={{fontSize:22,fontWeight:700,color:"#a78bfa"}}>{s.value}</div>
            <div style={{color:"#6b6b80",fontSize:12,marginTop:4}}>{s.label}</div>
          </div>
        ))}
      </div>
      <div className="card">
        <div style={{fontWeight:600,marginBottom:14}}>Recent Agent Traces</div>
        {(!data.recent_traces||data.recent_traces.length===0) && <div style={{color:"#6b6b80",fontSize:13}}>No traces yet. Send a chat message first.</div>}
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {(data.recent_traces||[]).map((t,i)=>(
            <div key={i} style={{padding:"10px 14px",background:"#111118",borderRadius:8,border:"1px solid rgba(255,255,255,0.06)"}}>
              <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:"#a78bfa",marginBottom:6,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.query}</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                <span className="tag tag-purple">⚡ {Math.round(t.latency_ms||0)}ms</span>
                <span className="tag tag-amber">🪙 {t.tokens}</span>
                {(t.tools||[]).map(tool=><span key={tool} className="tag tag-green">🔧 {tool}</span>)}
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function LeadsTab() {
  const [leads, setLeads] = useState([]);
  const [name, setName] = useState(""); const [email, setEmail] = useState(""); const [notes, setNotes] = useState("");
  const [loading, setLoading] = useState(true); const [msg, setMsg] = useState("");

  function load() { apiFetch("/metrics/leads").then(r=>{setLeads(Array.isArray(r)?r:[]);setLoading(false);}); }
  useEffect(()=>{ load(); },[]);

  async function create() {
    const r = await apiFetch("/metrics/leads",{method:"POST",body:JSON.stringify({name,email,notes})});
    if(r.id){setMsg("Lead created!");setName("");setEmail("");setNotes("");load();}
    else setMsg(r.detail||"Error");
  }

  return (
    <div style={{padding:24,maxWidth:800}}>
      <div style={{fontWeight:700,fontSize:20,marginBottom:4}}>CRM Leads</div>
      <div style={{color:"#6b6b80",fontSize:13,marginBottom:24}}>The crm_lookup tool reads from this table. Try asking the agent to look up a lead.</div>
      <div className="card" style={{marginBottom:20}}>
        <div style={{fontWeight:600,marginBottom:12}}>Add Lead</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
          <input placeholder="Name" value={name} onChange={e=>setName(e.target.value)}/>
          <input placeholder="Email" value={email} onChange={e=>setEmail(e.target.value)}/>
        </div>
        <input placeholder="Notes" value={notes} onChange={e=>setNotes(e.target.value)} style={{marginBottom:10}}/>
        <button className="btn-primary btn-sm" onClick={create}>Add Lead</button>
        {msg && <span style={{marginLeft:12,fontSize:13,color:"#22d3a5"}}>{msg}</span>}
      </div>
      {loading ? <div className="spinner"/> :
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {leads.map(l=>(
            <div key={l.id} className="card" style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontWeight:600}}>{l.name}</div>
                <div style={{color:"#6b6b80",fontSize:13,fontFamily:"'JetBrains Mono',monospace"}}>{l.email}</div>
                {l.notes && <div style={{fontSize:12,color:"#6b6b80",marginTop:4}}>{l.notes}</div>}
              </div>
              <span className={"tag tag-"+(l.status==="converted"?"green":l.status==="contacted"?"amber":"purple")}>{l.status}</span>
            </div>
          ))}
          {leads.length===0 && <div style={{color:"#6b6b80",fontSize:13}}>No leads yet.</div>}
        </div>
      }
    </div>
  );
}

function MemoryTab() {
  const [content, setContent] = useState(""); const [type, setType] = useState("fact"); const [msg, setMsg] = useState("");
  async function save() {
    if(!content.trim()) return;
    const r = await apiFetch("/metrics/memory",{method:"POST",body:JSON.stringify({content,type})});
    setMsg(r.message||"Saved!"); setContent("");
  }
  return (
    <div style={{padding:24,maxWidth:600}}>
      <div style={{fontWeight:700,fontSize:20,marginBottom:4}}>Long-term Memory</div>
      <div style={{color:"#6b6b80",fontSize:13,marginBottom:24}}>Facts saved here are injected into every agent system prompt — the agent will always remember them.</div>
      <div className="card">
        <textarea value={content} onChange={e=>setContent(e.target.value)} rows={3} placeholder="e.g. 'User prefers formal responses' or 'Company is in healthcare industry'" style={{marginBottom:10,resize:"vertical"}}/>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          <select value={type} onChange={e=>setType(e.target.value)} style={{flex:1,background:"#111118",color:"#e8e8f0",border:"1px solid rgba(255,255,255,0.08)",borderRadius:8,padding:"10px 14px"}}>
            <option value="fact">Fact</option>
            <option value="preference">Preference</option>
            <option value="history">History</option>
          </select>
          <button className="btn-primary btn-sm" onClick={save} disabled={!content.trim()}>Save</button>
        </div>
        {msg && <div style={{marginTop:10,color:"#22d3a5",fontSize:13}}>{msg}</div>}
      </div>
    </div>
  );
}

function Sidebar({tab, setTab, onLogout, role}) {
  const tabs = [{id:"chat",icon:"💬",label:"Chat"},{id:"docs",icon:"📄",label:"Documents"},{id:"metrics",icon:"📊",label:"Metrics"},{id:"leads",icon:"👤",label:"CRM Leads"},{id:"memory",icon:"🧠",label:"Memory"}];
  return (
    <div className="sidebar">
      <div style={{padding:"0 20px",marginBottom:28}}>
        <div style={{fontWeight:800,fontSize:18,color:"#7c6aff"}}>IMPERION</div>
        <div style={{fontSize:11,color:"#6b6b80",marginTop:2,fontFamily:"'JetBrains Mono',monospace"}}>AI PLATFORM</div>
      </div>
      <div style={{flex:1,display:"flex",flexDirection:"column",gap:2,padding:"0 10px"}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} className={"nav-btn"+(tab===t.id?" active":"")}>
            <span>{t.icon}</span>{t.label}
          </button>
        ))}
      </div>
      <div style={{padding:"0 10px"}}>
        <div style={{fontSize:12,color:"#6b6b80",padding:"8px 12px",fontFamily:"'JetBrains Mono',monospace"}}>{(role||"").toUpperCase()}</div>
        <button onClick={onLogout} className="btn-ghost btn-sm" style={{width:"100%"}}>Sign Out</button>
      </div>
    </div>
  );
}

function App() {
  const [user, setUser] = useState(()=>{
    const token = localStorage.getItem("imp_token");
    const role = localStorage.getItem("imp_role");
    return token ? {token, role} : null;
  });
  const [tab, setTab] = useState("chat");

  function logout() { localStorage.removeItem("imp_token"); localStorage.removeItem("imp_role"); setUser(null); }

  if (!user) return React.createElement(AuthScreen, {onLogin: u => setUser(u)});

  const tabMap = {chat:React.createElement(ChatTab), docs:React.createElement(DocsTab), metrics:React.createElement(MetricsTab), leads:React.createElement(LeadsTab), memory:React.createElement(MemoryTab)};

  return (
    <div style={{display:"flex"}}>
      <Sidebar tab={tab} setTab={setTab} onLogout={logout} role={user.role}/>
      <div className="main">{tabMap[tab]}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
