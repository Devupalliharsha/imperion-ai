<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Imperion AI Platform</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0; -webkit-tap-highlight-color: transparent;}
body{background:#0a0a0f;color:#e8e8f0;font-family:'Syne',sans-serif;height:100vh;overflow:hidden;}

/* Inputs & Buttons */
input,textarea,select{font-family:'Syne',sans-serif;background:#111118;border:1px solid rgba(255,255,255,0.08);color:#e8e8f0;border-radius:8px;padding:10px 14px;width:100%;outline:none;font-size:14px;transition:border .2s}
input:focus,textarea:focus,select:focus{border-color:#7c6aff}
button{font-family:'Syne',sans-serif;cursor:pointer;border:none;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:600;transition:all .15s}
.btn-primary{background:#7c6aff;color:#fff}
.btn-primary:hover{background:#6b59ee}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed}
.btn-ghost{background:transparent;color:#6b6b80;border:1px solid rgba(255,255,255,0.08)}
.btn-ghost:hover{border-color:#7c6aff;color:#a78bfa}
.btn-sm{padding:6px 14px;font-size:13px}

/* Components */
.card{background:#16161f;border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:20px}
.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;font-family:'JetBrains Mono',monospace}
.tag-green{background:rgba(34,211,165,0.1);color:#22d3a5}
.tag-amber{background:rgba(251,191,36,0.1);color:#fbbf24}
.tag-red{background:rgba(248,113,113,0.1);color:#f87171}
.tag-purple{background:rgba(124,106,255,0.1);color:#a78bfa}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,0.1);border-top-color:#7c6aff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle}

@keyframes spin{to{transform:rotate(360deg)}}
.fade-in{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px}

/* App Shell & Layout */
.app-shell { display: flex; height: 100vh; width: 100vw; position: relative; }

.sidebar { width:240px; background:#111118; border-right:1px solid rgba(255,255,255,0.06); display:flex; flex-direction:column; height:100%; padding:20px 0; position:relative; z-index:100; transition:transform .3s cubic-bezier(0.4, 0, 0.2, 1); flex-shrink:0; }
.nav-btn { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:8px; background:transparent; color:#6b6b80; border:none; cursor:pointer; text-align:left; font-size:14px; font-family:'Syne',sans-serif; font-weight:600; transition:all .15s; width:100%; }
.nav-btn:hover { color:#a78bfa; }
.nav-btn.active { background:rgba(124,106,255,0.15); color:#a78bfa; }

.main { flex:1; height:100vh; overflow-y:auto; overflow-x:hidden; display:flex; flex-direction:column; min-width:0; background:#0a0a0f; }

.topbar { padding:20px 24px; border-bottom:1px solid rgba(255,255,255,0.06); display:flex; justify-content:space-between; align-items:center; background:#0a0a0f; z-index:10; flex-shrink:0; }

.hamburger { display:none; background:transparent; border:none; color:#e8e8f0; cursor:pointer; padding:6px; border-radius:6px; margin-right:12px; }
.hamburger:hover { background:rgba(255,255,255,0.05); }

.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:99; backdrop-filter:blur(2px); }

/* Responsive Media Queries */
@media (max-width: 768px) {
  .sidebar { position:fixed; top:0; left:0; bottom:0; transform:translateX(-100%); }
  .sidebar.open { transform:translateX(0); }
  .hamburger { display:flex; align-items:center; justify-content:center; }
  .overlay.open { display:block; }
  .topbar { padding:16px 20px; }
  .card { padding: 16px; }
}
</style>
</head>
<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#6b6b80">Loading...</div></div>
<script type="text/babel">
const {useState, useEffect, useRef} = React;
const API = window.location.origin;

function apiFetch(path, opts={}) {
  const token = localStorage.getItem("imp_token");
  const headers = {"Content-Type":"application/json"};
  if (token) headers["Authorization"] = "Bearer " + token;
  return fetch(API + path, {headers, ...opts}).then(r => r.json());
}

// ── AUTH SCREEN ─────────────────────────────────────────────────────────────
function AuthScreen({onLogin}) {
  const [mode, setMode] = useState("login");
  const [username, setUsername] = useState("");
  const [password, setPassword] = useState("");
  const [tenant, setTenant] = useState("");
  const [role, setRole] = useState("admin");
  const [err, setErr] = useState("");
  const [loading, setLoading] = useState(false);

  async function submit() {
    setLoading(true); setErr("");
    try {
      if (mode === "register") {
        const r = await apiFetch("/auth/register", {method:"POST", body:JSON.stringify({username, password, tenant_name:tenant, role})});
        if (r.message) { setMode("login"); setErr("Registered! Now login."); }
        else setErr(r.detail || "Error");
      } else {
        const body = new URLSearchParams({username, password});
        const r = await fetch(API+"/auth/login",{method:"POST",body,headers:{"Content-Type":"application/x-www-form-urlencoded"}}).then(x=>x.json());
        if (r.access_token) {
          localStorage.setItem("imp_token", r.access_token);
          localStorage.setItem("imp_role", r.role);
          onLogin(r);
        } else setErr(r.detail || "Invalid credentials");
      }
    } catch(e){ setErr("Connection error — is the server running?"); }
    setLoading(false);
  }

  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20, overflowY:"auto"}}>
      <div style={{width:"100%",maxWidth:400}} className="fade-in">
        <div style={{textAlign:"center",marginBottom:40}}>
          <div style={{fontSize:32,fontWeight:800}}><span style={{color:"#7c6aff"}}>IMPERION</span></div>
          <div style={{color:"#6b6b80",fontSize:13,marginTop:6}}>Multi-tenant AI Platform</div>
        </div>
        <div className="card">
          <div style={{display:"flex",gap:8,marginBottom:20}}>
            <button onClick={()=>setMode("login")} style={{flex:1}} className={mode==="login"?"btn-primary":"btn-ghost"}>Login</button>
            <button onClick={()=>setMode("register")} style={{flex:1}} className={mode==="register"?"btn-primary":"btn-ghost"}>Register</button>
          </div>
          {err && <div style={{padding:"10px 14px",borderRadius:8,marginBottom:14,background:err.includes("!")?"rgba(34,211,165,0.1)":"rgba(248,113,113,0.1)",color:err.includes("!")?"#22d3a5":"#f87171",fontSize:13}}>{err}</div>}
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <input placeholder="Username" value={username} onChange={e=>setUsername(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()}/>
            <input placeholder="Password" type="password" value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()}/>
            {mode==="register" && <>
              <input placeholder="Company name (your tenant)" value={tenant} onChange={e=>setTenant(e.target.value)}/>
              <select value={role} onChange={e=>setRole(e.target.value)} style={{background:"#111118",color:"#e8e8f0",border:"1px solid rgba(255,255,255,0.08)",borderRadius:8,padding:"10px 14px"}}>
                <option value="admin">Admin</option>
                <option value="agent">Agent</option>
              </select>
            </>}
            <button className="btn-primary" onClick={submit} disabled={loading} style={{height:44,marginTop:4}}>
              {loading ? <span className="spinner"/> : (mode==="login" ? "Sign In" : "Create Account")}
            </button>
          </div>
        </div>
        <div style={{textAlign:"center",marginTop:16,color:"#6b6b80",fontSize:12}}>Register as admin → upload docs → chat</div>
      </div>
    </div>
  );
}

// ── REUSABLE SVG HAMBURGER ──────────────────────────────────────────────────
const MenuIcon = () => (
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <line x1="3" y1="12" x2="21" y2="12"></line>
    <line x1="3" y1="6" x2="21" y2="6"></line>
    <line x1="3" y1="18" x2="21" y2="18"></line>
  </svg>
);

// ── CHAT TAB ────────────────────────────────────────────────────────────────
function ChatTab({onHamburger}) {
  const [messages, setMessages] = useState([{role:"assistant",content:"Hi! I'm your Imperion AI assistant. Upload documents in the Documents tab, then ask me anything about them. I can also search the web, check your CRM, or look up calendar events."}]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [sessionId] = useState(()=>"sess_"+Math.random().toString(36).slice(2));
  const [lastEval, setLastEval] = useState(null);
  const bottomRef = useRef();

  useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:"smooth"}); }, [messages, loading]);

  async function send() {
    if (!input.trim() || loading) return;
    const q = input; setInput(""); setLoading(true);
    setMessages(m=>[...m,{role:"user",content:q}]);
    try {
      const r = await apiFetch("/agent/chat",{method:"POST",body:JSON.stringify({query:q,session_id:sessionId})});
      setMessages(m=>[...m,{role:"assistant",content:r.answer||r.detail||"Error getting response",tools:r.tool_calls,eval:r.eval}]);
      if(r.eval) setLastEval(r.eval);
    } catch(e){
      setMessages(m=>[...m,{role:"assistant",content:"Connection error."}]);
    }
    setLoading(false);
  }

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100vh"}}>
      <div className="topbar">
        <div style={{display:"flex", alignItems:"center"}}>
          <button className="hamburger" onClick={onHamburger}><MenuIcon /></button>
          <div>
            <div style={{fontWeight:700,fontSize:18}}>AI Chat</div>
            <div style={{color:"#6b6b80",fontSize:12,marginTop:2,fontFamily:"'JetBrains Mono',monospace"}}>Planner → Retriever → Executor</div>
          </div>
        </div>
        {lastEval && (
          <div style={{display:"flex",gap:6,flexWrap:"wrap",justifyContent:"flex-end"}}>
            <span className="tag tag-purple">⚡ {Math.round(lastEval.latency_ms)}ms</span>
            <span className="tag tag-amber" style={{display: window.innerWidth < 768 ? 'none' : 'inline-flex'}}>🪙 {lastEval.tokens_used} tokens</span>
          </div>
        )}
      </div>
      
      <div style={{flex:1,overflowY:"auto",padding:"24px",display:"flex",flexDirection:"column",gap:16}}>
        {messages.map((m,i)=>(
          <div key={i} className="fade-in" style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
            <div style={{maxWidth: window.innerWidth < 768 ? "90%" : "75%"}}>
              {m.role==="assistant" && <div style={{fontSize:11,color:"#6b6b80",marginBottom:4,fontFamily:"'JetBrains Mono',monospace"}}>IMPERION AI</div>}
              <div style={{background:m.role==="user"?"#7c6aff":"#16161f",border:m.role==="user"?"none":"1px solid rgba(255,255,255,0.08)",borderRadius:m.role==="user"?"12px 12px 4px 12px":"12px 12px 12px 4px",padding:"12px 16px",color:m.role==="user"?"#fff":"#e8e8f0",fontSize:14,lineHeight:1.6,whiteSpace:"pre-wrap"}}>{m.content}</div>
              {m.tools && m.tools.length>0 && (
                <div style={{marginTop:8,display:"flex",gap:6,flexWrap:"wrap"}}>
                  {m.tools.map(t=><span key={t} className="tag tag-green">🔧 {t}</span>)}
                </div>
              )}
            </div>
          </div>
        ))}
        {loading && (
          <div className="fade-in" style={{display:"flex",gap:10,alignItems:"center"}}>
            <div className="spinner"/>
            <span style={{color:"#6b6b80",fontSize:13}}>Processing execution...</span>
          </div>
        )}
        <div ref={bottomRef}/>
      </div>
      
      <div style={{padding:"16px 24px",borderTop:"1px solid rgba(255,255,255,0.06)",display:"flex",gap:10,background:"#0a0a0f"}}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&send()} placeholder="Message AI..." style={{flex:1,height:44}}/>
        <button className="btn-primary" onClick={send} disabled={loading||!input.trim()} style={{minWidth:60,height:44,padding:"10px 14px"}}>
          {loading ? <span className="spinner"/> : "↑"}
        </button>
      </div>
    </div>
  );
}

// ── DOCS TAB ────────────────────────────────────────────────────────────────
function DocsTab({onHamburger}) {
  const [file, setFile] = useState(null);
  const [text, setText] = useState("");
  const [source, setSource] = useState("manual");
  const [msg, setMsg] = useState("");
  const [loading, setLoading] = useState(false);

  async function uploadFile() {
    if(!file) return; setLoading(true); setMsg("");
    const fd = new FormData(); fd.append("file", file);
    const token = localStorage.getItem("imp_token");
    const r = await fetch(API+"/docs/upload",{method:"POST",headers:{Authorization:"Bearer "+token},body:fd}).then(x=>x.json());
    setMsg(r.message||r.detail||"Done"); setLoading(false);
  }

  async function addText() {
    if(!text.trim()) return; setLoading(true); setMsg("");
    const r = await apiFetch("/docs/add-text",{method:"POST",body:JSON.stringify({text,source})});
    setMsg(r.message||r.detail); setText(""); setLoading(false);
  }

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100vh"}}>
      <div className="topbar">
        <div style={{display:"flex", alignItems:"center"}}>
          <button className="hamburger" onClick={onHamburger}><MenuIcon /></button>
          <div>
            <div style={{fontWeight:700,fontSize:18}}>Document Base</div>
            <div style={{color:"#6b6b80",fontSize:12,marginTop:2,fontFamily:"'JetBrains Mono',monospace"}}>Knowledge Indexing</div>
          </div>
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:24}}>
        <div style={{maxWidth:700, margin:"0 auto"}}>
          <div style={{color:"#6b6b80",fontSize:14,marginBottom:24,lineHeight:1.5}}>Uploaded docs are chunked, embedded, and stored in the vector database. The agent retrieves them automatically during chat.</div>
          
          <div className="card" style={{marginBottom:16}}>
            <div style={{fontWeight:600,marginBottom:10}}>Upload a file (.txt, .md, .csv)</div>
            <input type="file" accept=".txt,.md,.csv" onChange={e=>setFile(e.target.files[0])} style={{marginBottom:16,background:"transparent",border:"none",padding:0}}/>
            <button className="btn-primary btn-sm" onClick={uploadFile} disabled={loading||!file} style={{width:"100%", padding:"10px"}}>
              {loading ? <span className="spinner"/> : "Upload & Index"}
            </button>
          </div>
          
          <div className="card">
            <div style={{fontWeight:600,marginBottom:10}}>Add text directly</div>
            <textarea value={text} onChange={e=>setText(e.target.value)} rows={5} placeholder="Paste any knowledge here — FAQs, product info, company data..." style={{marginBottom:12,resize:"vertical"}}/>
            <input value={source} onChange={e=>setSource(e.target.value)} placeholder="Source label (e.g. company-faq)" style={{marginBottom:16}}/>
            <button className="btn-primary btn-sm" onClick={addText} disabled={loading||!text.trim()} style={{width:"100%", padding:"10px"}}>
              {loading ? <span className="spinner"/> : "Add to Knowledge Base"}
            </button>
          </div>
          
          {msg && <div className="fade-in" style={{marginTop:16,padding:"12px 16px",borderRadius:8,background:"rgba(34,211,165,0.1)",color:"#22d3a5",fontSize:14}}>{msg}</div>}
        </div>
      </div>
    </div>
  );
}

// ── METRICS TAB ─────────────────────────────────────────────────────────────
function MetricsTab({onHamburger}) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  
  useEffect(()=>{ apiFetch("/metrics/dashboard").then(r=>{setData(r);setLoading(false);}); },[]);

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100vh"}}>
      <div className="topbar">
        <div style={{display:"flex", alignItems:"center"}}>
          <button className="hamburger" onClick={onHamburger}><MenuIcon /></button>
          <div>
            <div style={{fontWeight:700,fontSize:18}}>Observability</div>
            <div style={{color:"#6b6b80",fontSize:12,marginTop:2,fontFamily:"'JetBrains Mono',monospace"}}>System Telemetry</div>
          </div>
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:24}}>
        <div style={{maxWidth:1000, margin:"0 auto"}}>
          {loading ? (
            <div style={{padding:40,display:"flex",gap:12,alignItems:"center",justifyContent:"center"}}><div className="spinner"/><span style={{color:"#6b6b80"}}>Fetching telemetry...</span></div>
          ) : (
            <>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:16,marginBottom:32}}>
                {[
                  {label:"Total Queries",value:data.total_queries,icon:"🔍"},
                  {label:"Avg Latency",value:data.avg_latency_ms+"ms",icon:"⚡"},
                  {label:"Total Tokens",value:(data.total_tokens||0).toLocaleString(),icon:"🪙"},
                  {label:"Active Contexts",value:data.memory_count,icon:"🧠"}
                ].map(s=>(
                  <div key={s.label} className="card fade-in" style={{textAlign:"center", padding:"24px 16px"}}>
                    <div style={{fontSize:24,marginBottom:8}}>{s.icon}</div>
                    <div style={{fontSize:24,fontWeight:700,color:"#a78bfa"}}>{s.value}</div>
                    <div style={{color:"#6b6b80",fontSize:13,marginTop:4}}>{s.label}</div>
                  </div>
                ))}
              </div>
              
              <div className="card fade-in">
                <div style={{fontWeight:600,marginBottom:16, fontSize:16}}>Recent Agent Traces</div>
                {(!data.recent_traces||data.recent_traces.length===0) && <div style={{color:"#6b6b80",fontSize:14}}>No execution traces recorded yet.</div>}
                <div style={{display:"flex",flexDirection:"column",gap:12}}>
                  {(data.recent_traces||[]).map((t,i)=>(
                    <div key={i} style={{padding:"14px",background:"#111118",borderRadius:8,border:"1px solid rgba(255,255,255,0.06)"}}>
                      <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:13,color:"#e8e8f0",marginBottom:10,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.query}</div>
                      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                        <span className="tag tag-purple">⚡ {Math.round(t.latency_ms||0)}ms</span>
                        <span className="tag tag-amber">🪙 {t.tokens}</span>
                        {(t.tools||[]).map(tool=><span key={tool} className="tag tag-green">🔧 {tool}</span>)}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// ── LEADS TAB ───────────────────────────────────────────────────────────────
function LeadsTab({onHamburger}) {
  const [leads, setLeads] = useState([]);
  const [name, setName] = useState(""); const [email, setEmail] = useState(""); const [notes, setNotes] = useState("");
  const [loading, setLoading] = useState(true); const [msg, setMsg] = useState("");

  function load() { apiFetch("/metrics/leads").then(r=>{setLeads(Array.isArray(r)?r:[]);setLoading(false);}); }
  useEffect(()=>{ load(); },[]);

  async function create() {
    const r = await apiFetch("/metrics/leads",{method:"POST",body:JSON.stringify({name,email,notes})});
    if(r.id){setMsg("Lead registered successfully.");setName("");setEmail("");setNotes("");load();}
    else setMsg(r.detail||"Error");
    setTimeout(()=>setMsg(""),3000);
  }

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100vh"}}>
      <div className="topbar">
        <div style={{display:"flex", alignItems:"center"}}>
          <button className="hamburger" onClick={onHamburger}><MenuIcon /></button>
          <div>
            <div style={{fontWeight:700,fontSize:18}}>CRM Registry</div>
            <div style={{color:"#6b6b80",fontSize:12,marginTop:2,fontFamily:"'JetBrains Mono',monospace"}}>Client Management</div>
          </div>
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:24}}>
        <div style={{maxWidth:800, margin:"0 auto"}}>
          <div className="card" style={{marginBottom:24}}>
            <div style={{fontWeight:600,marginBottom:16,fontSize:16}}>Add New Lead</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(200px, 1fr))",gap:12,marginBottom:12}}>
              <input placeholder="Entity Name" value={name} onChange={e=>setName(e.target.value)}/>
              <input placeholder="Contact Email" value={email} onChange={e=>setEmail(e.target.value)}/>
            </div>
            <input placeholder="Context / Notes" value={notes} onChange={e=>setNotes(e.target.value)} style={{marginBottom:16}}/>
            <div style={{display:"flex", alignItems:"center", gap:16}}>
              <button className="btn-primary" onClick={create} disabled={!name.trim()}>Register Lead</button>
              {msg && <span className="fade-in" style={{fontSize:13,color:"#22d3a5"}}>{msg}</span>}
            </div>
          </div>
          
          <div style={{fontWeight:600,marginBottom:16,fontSize:16}}>Registry Directory</div>
          {loading ? <div className="spinner" style={{margin:"20px auto", display:"block"}}/> :
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              {leads.map(l=>(
                <div key={l.id} className="card fade-in" style={{display:"flex",justifyContent:"space-between",alignItems:"center", flexWrap:"wrap", gap:12}}>
                  <div>
                    <div style={{fontWeight:600, fontSize:15, color:"#e8e8f0"}}>{l.name}</div>
                    <div style={{color:"#a78bfa",fontSize:13,fontFamily:"'JetBrains Mono',monospace", marginTop:2}}>{l.email}</div>
                    {l.notes && <div style={{fontSize:13,color:"#6b6b80",marginTop:6}}>{l.notes}</div>}
                  </div>
                  <span className={"tag tag-"+(l.status==="converted"?"green":l.status==="contacted"?"amber":"purple")}>{l.status || "Registered"}</span>
                </div>
              ))}
              {leads.length===0 && <div style={{color:"#6b6b80",fontSize:14, padding:"20px", textAlign:"center", background:"#111118", borderRadius:8}}>No leads registered in this workspace.</div>}
            </div>
          }
        </div>
      </div>
    </div>
  );
}

// ── MEMORY TAB ──────────────────────────────────────────────────────────────
function MemoryTab({onHamburger}) {
  const [content, setContent] = useState(""); const [type, setType] = useState("fact"); const [msg, setMsg] = useState("");
  
  async function save() {
    if(!content.trim()) return;
    const r = await apiFetch("/metrics/memory",{method:"POST",body:JSON.stringify({content,type})});
    setMsg(r.message||"Context Saved!"); setContent("");
    setTimeout(()=>setMsg(""),3000);
  }
  
  return (
    <div style={{display:"flex",flexDirection:"column",height:"100vh"}}>
      <div className="topbar">
        <div style={{display:"flex", alignItems:"center"}}>
          <button className="hamburger" onClick={onHamburger}><MenuIcon /></button>
          <div>
            <div style={{fontWeight:700,fontSize:18}}>Global Context</div>
            <div style={{color:"#6b6b80",fontSize:12,marginTop:2,fontFamily:"'JetBrains Mono',monospace"}}>Persistent Memory</div>
          </div>
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:24}}>
        <div style={{maxWidth:700, margin:"0 auto"}}>
          <div style={{color:"#6b6b80",fontSize:14,marginBottom:24,lineHeight:1.6}}>Directives and facts saved here are injected into every agent prompt across the workspace, guaranteeing the AI always adheres to your operational context.</div>
          <div className="card">
            <textarea value={content} onChange={e=>setContent(e.target.value)} rows={4} placeholder="e.g. 'Always write in a formal tone' or 'Our target demographic is enterprise SaaS companies'" style={{marginBottom:16,resize:"vertical"}}/>
            <div style={{display:"flex",gap:12,alignItems:"center",flexWrap:"wrap"}}>
              <select value={type} onChange={e=>setType(e.target.value)} style={{maxWidth:"200px"}}>
                <option value="fact">Operational Fact</option>
                <option value="preference">Agent Preference</option>
                <option value="history">Historical Context</option>
              </select>
              <button className="btn-primary" onClick={save} disabled={!content.trim()}>Commit Memory</button>
              {msg && <div className="fade-in" style={{color:"#22d3a5",fontSize:14}}>{msg}</div>}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

          <div>

            <div style={{color:"#6b6b80",fontSize:12,marginTop:2,fontFamily:"'JetBrains Mono',monospace"}}>System Architecture</div>
          </div>
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:24}}>
        <div style={{maxWidth:800, margin:"0 auto", paddingBottom:40}}>
          <div style={{textAlign:"center", padding:"40px 0"}}>
            <div style={{fontSize:42, fontWeight:800, color:"#7c6aff", marginBottom:16, letterSpacing:"-1px"}}>IMPERION AI</div>
            <div style={{fontSize:16, color:"#6b6b80", lineHeight:1.6, maxWidth:600, margin:"0 auto"}}>
              An enterprise-grade orchestration environment providing seamless integration between localized knowledge bases, client management structures, and autonomous AI reasoning.
            </div>
          </div>
          
          <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(280px, 1fr))", gap:20}}>

            </div>
            
            <div className="card fade-in" style={{animationDelay:"0.2s"}}>
              <div style={{fontSize:24, marginBottom:16}}>🔒</div>
              <div style={{fontWeight:700, fontSize:16, marginBottom:8, color:"#e8e8f0"}}>Isolated Architecture</div>
              <div style={{fontSize:14, color:"#6b6b80", lineHeight:1.6}}>Workspace data is completely partitioned at the database layer, guaranteeing total multi-tenant data integrity.</div>
            </div>
            
            <div className="card fade-in" style={{animationDelay:"0.3s"}}>
              <div style={{fontSize:24, marginBottom:16}}>⚡</div>
              <div style={{fontWeight:700, fontSize:16, marginBottom:8, color:"#e8e8f0"}}>RAG Document Base</div>
              <div style={{fontSize:14, color:"#6b6b80", lineHeight:1.6}}>Semantic indexing of your uploaded files, dynamically injecting precise organizational knowledge into active chats.</div>

            <div className="card fade-in" style={{animationDelay:"0.4s"}}>

              <div style={{fontWeight:700, fontSize:16, marginBottom:8, color:"#e8e8f0"}}>Deep Observability</div>
              <div style={{fontSize:14, color:"#6b6b80", lineHeight:1.6}}>Every autonomous tool call, latency millisecond, and token is permanently tracked and logged for complete operational transparency.</div>

      </div>
    </div>
  );
}

// ── SIDEBAR ─────────────────────────────────────────────────────────────────
function Sidebar({tab, setTab, onLogout, role, open, onClose}) {
  const tabs = [
    {id:"chat", icon:"💬", label:"Chat"},
    {id:"docs", icon:"📄", label:"Documents"},
    {id:"metrics", icon:"📊", label:"Observability"},
    {id:"leads", icon:"👤", label:"CRM Registry"},
    {id:"memory", icon:"🧠", label:"Global Context"},
    {id:"about", icon:"✦", label:"About"}
  ];
  
  return (
    <div className={`sidebar ${open ? "open" : ""}`}>
      <div style={{padding:"0 20px",marginBottom:32}}>
        <div style={{fontWeight:800,fontSize:20,color:"#7c6aff",letterSpacing:"-0.5px"}}>IMPERION</div>
        <div style={{fontSize:11,color:"#6b6b80",marginTop:4,fontFamily:"'JetBrains Mono',monospace"}}>AI PLATFORM</div>
      </div>
      <div style={{flex:1,display:"flex",flexDirection:"column",gap:4,padding:"0 12px", overflowY:"auto"}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>{setTab(t.id); onClose();}} className={`nav-btn ${tab===t.id ? "active" : ""}`}>
            <span style={{fontSize:16, width:24, textAlign:"center"}}>{t.icon}</span>{t.label}
          </button>
        ))}
      </div>
      <div style={{padding:"16px 16px 0", borderTop:"1px solid rgba(255,255,255,0.06)"}}>
        <div style={{fontSize:11,color:"#6b6b80",padding:"0 8px 12px",fontFamily:"'JetBrains Mono',monospace"}}>Role: {(role||"User").toUpperCase()}</div>
        <button onClick={onLogout} className="btn-ghost btn-sm" style={{width:"100%", padding:"10px"}}>Sign Out</button>
      </div>
    </div>
  );
}

// ── APP WRAPPER ─────────────────────────────────────────────────────────────
function App() {
  const [user, setUser] = useState(()=>{
    const token = localStorage.getItem("imp_token");
    const role = localStorage.getItem("imp_role");
    return token ? {token, role} : null;
  });
  const [tab, setTab] = useState("chat");
  const [sidebarOpen, setSidebarOpen] = useState(false);

  function logout() { localStorage.removeItem("imp_token"); localStorage.removeItem("imp_role"); setUser(null); }
  const toggleSidebar = () => setSidebarOpen(!sidebarOpen);
  const closeSidebar = () => setSidebarOpen(false);

  if (!user) return <AuthScreen onLogin={u => setUser(u)} />;

  const tabProps = { onHamburger: toggleSidebar };
  const tabMap = {
    chat: <ChatTab {...tabProps} />,
    docs: <DocsTab {...tabProps} />,
    metrics: <MetricsTab {...tabProps} />,
    leads: <LeadsTab {...tabProps} />,
    memory: <MemoryTab {...tabProps} />,
    about: <AboutTab {...tabProps} />
  };

  return (
    <div className="app-shell">
      <div className={`overlay ${sidebarOpen ? 'open' : ''}`} onClick={closeSidebar}></div>
      <Sidebar tab={tab} setTab={setTab} onLogout={logout} role={user.role} open={sidebarOpen} onClose={closeSidebar} />
      <div className="main">{tabMap[tab]}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
